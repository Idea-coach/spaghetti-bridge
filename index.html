<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spaghetti Bridge Designer - Local Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f8fafc; font-family: 'Pretendard', sans-serif; }
        .canvas-container { position: relative; width: 100%; height: 100%; cursor: crosshair; }
        .view-label { position: absolute; top: 12px; left: 12px; background: rgba(255, 255, 255, 0.9); padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; pointer-events: none; border: 1px solid #e2e8f0; z-index: 10; }
        .mode-active { background-color: #2563eb !important; color: white !important; }
        .grid-view { display: grid; grid-template-columns: 1fr 1.5fr 1fr; grid-template-rows: 1fr 1fr; gap: 4px; height: calc(100vh - 80px); background: #e2e8f0; }
        .view-3d-main { grid-row: span 2; }
        .view-box { background: #ffffff; position: relative; overflow: hidden; }
        .control-panel { height: 80px; background: #ffffff; border-bottom: 2px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; }
    </style>
</head>
<body>

    <div class="flex flex-col h-screen">
        <header class="control-panel">
            <div>
                <h1 class="text-xl font-black text-slate-900">BRIDGE <span class="text-blue-600">DESIGNER</span></h1>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">자동 대칭 모드 활성화</p>
            </div>

            <div class="flex bg-slate-100 p-1 rounded-xl">
                <button id="btn-node" class="px-5 py-2 text-xs font-bold rounded-lg mode-active" onclick="setMode('node')">점 생성</button>
                <button id="btn-edge" class="px-5 py-2 text-xs font-bold rounded-lg text-slate-500" onclick="setMode('edge')">연결</button>
                <button id="btn-delete" class="px-5 py-2 text-xs font-bold rounded-lg text-slate-500" onclick="setMode('delete')">삭제</button>
            </div>

            <button onclick="location.reload()" class="px-4 py-2 border border-slate-200 rounded-xl text-xs font-bold hover:bg-slate-50">초기화</button>
        </header>

        <main class="grid-view">
            <div class="view-box"><div class="view-label">Top (X/Z)</div><div id="container-top" class="canvas-container"></div></div>
            <div class="view-box view-3d-main"><div id="container-3d" class="canvas-container"></div></div>
            <div class="view-box"><div class="view-label">Front (X/Y)</div><div id="container-front" class="canvas-container"></div></div>
            <div class="view-box"><div class="view-label">Bottom (X/Z)</div><div id="container-bottom" class="canvas-container"></div></div>
            <div class="view-box"><div class="view-label">Right (Z/Y)</div><div id="container-right" class="canvas-container"></div></div>
        </main>
    </div>

    <script>
        let scene3d, camera3d, renderer3d, controls3d;
        let views = { top: {}, front: {}, right: {}, bottom: {} };
        let nodes = [], edges = [];
        let mode = 'node';
        let selectedNode = null;
        const SIDE_DEPTH = 4;
        const BRIDGE_L = 30;

        window.setMode = (m) => {
            mode = m;
            document.querySelectorAll('button[id^="btn-"]').forEach(b => b.classList.remove('mode-active', 'text-slate-500'));
            document.getElementById('btn-' + m).classList.add('mode-active');
            if(selectedNode) highlightNode(selectedNode, false);
            selectedNode = null;
        }

        function addNode(x, y, z, fixed = false) {
            if(nodes.find(n => n.x === x && n.y === y && n.z === z)) return;
            const node = { id: `n_${x}_${y}_${z}`, x, y, z, fixed, meshes: {} };
            ['top', 'front', 'right', 'bottom', '3d'].forEach(vId => {
                const mat = new THREE.MeshPhongMaterial({ color: fixed ? 0x64748b : 0x334155 });
                const mesh = new THREE.Mesh(new THREE.SphereGeometry(vId === '3d' ? 0.35 : 0.5), mat);
                mesh.position.set(x, y, z);
                if(vId === '3d') scene3d.add(mesh);
                else views[vId].scene.add(mesh);
                node.meshes[vId] = mesh;
            });
            nodes.push(node);
        }

        function addEdge(n1, n2) {
            const edgeId = [n1.id, n2.id].sort().join('_');
            if(edges.find(e => e.id === edgeId)) return;
            const edge = { id: edgeId, n1, n2, meshes: {} };
            ['top', 'front', 'right', 'bottom', '3d'].forEach(vId => {
                const mat = new THREE.MeshPhongMaterial({ color: 0x3b82f6 });
                const mesh = createCylinderMesh(n1, n2, vId === '3d' ? 0.12 : 0.18, mat);
                if(vId === '3d') scene3d.add(mesh);
                else views[vId].scene.add(mesh);
                edge.meshes[vId] = mesh;
            });
            edges.push(edge);
        }

        function createCylinderMesh(n1, n2, radius, material) {
            const p1 = new THREE.Vector3(n1.x, n1.y, n1.z);
            const p2 = new THREE.Vector3(n2.x, n2.y, n2.z);
            const dist = p1.distanceTo(p2);
            const mesh = new THREE.Mesh(new THREE.CylinderGeometry(radius, radius, dist, 6), material);
            mesh.position.copy(p1.clone().lerp(p2, 0.5));
            mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), p2.clone().sub(p1).normalize());
            return mesh;
        }

        function highlightNode(node, active) {
            const color = node.fixed ? 0x64748b : (active ? 0x2563eb : 0x334155);
            Object.values(node.meshes).forEach(m => m.material.color.setHex(color));
        }

        function init() {
            init3D();
            init2DView('top', new THREE.Vector3(0, 50, 0));
            init2DView('front', new THREE.Vector3(0, 0, 50));
            init2DView('right', new THREE.Vector3(50, 0, 0));
            init2DView('bottom', new THREE.Vector3(0, -50, 0));
            
            // 고정 노드 자동 생성
            addNode(-BRIDGE_L/2, 0, SIDE_DEPTH, true);
            addNode(BRIDGE_L/2, 0, SIDE_DEPTH, true);
            addNode(-BRIDGE_L/2, 0, -SIDE_DEPTH, true);
            addNode(BRIDGE_L/2, 0, -SIDE_DEPTH, true);

            animate();
        }

        function init3D() {
            const container = document.getElementById('container-3d');
            scene3d = new THREE.Scene();
            scene3d.background = new THREE.Color(0xf1f5f9);
            camera3d = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera3d.position.set(35, 25, 35);
            renderer3d = new THREE.WebGLRenderer({ antialias: true });
            renderer3d.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer3d.domElement);
            controls3d = new THREE.OrbitControls(camera3d, renderer3d.domElement);
            scene3d.add(new THREE.AmbientLight(0xffffff, 0.8));
            scene3d.add(new THREE.GridHelper(60, 30, 0xcbd5e1, 0xe2e8f0));
        }

        function init2DView(id, pos) {
            const container = document.getElementById('container-' + id);
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);
            const size = 20;
            const aspect = container.clientWidth / container.clientHeight;
            const camera = new THREE.OrthographicCamera(-size * aspect, size * aspect, size, -size, 0.1, 1000);
            camera.position.copy(pos);
            camera.lookAt(0, 0, 0);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);
            scene.add(new THREE.GridHelper(60, 30, 0xe2e8f0, 0xf1f5f9));

            views[id] = { scene, camera, renderer };
            renderer.domElement.addEventListener('mousedown', (e) => handleInteraction(e, id));
        }

        function handleInteraction(event, viewId) {
            const target = views[viewId];
            const rect = target.renderer.domElement.getBoundingClientRect();
            const mouse = new THREE.Vector2(((event.clientX - rect.left) / rect.width) * 2 - 1, -((event.clientY - rect.top) / rect.height) * 2 + 1);
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, target.camera);

            const intersects = raycaster.intersectObjects(nodes.map(n => n.meshes[viewId]));

            if (mode === 'node') {
                const ray = raycaster.ray;
                let plane;
                if (viewId === 'top' || viewId === 'bottom') plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
                else if (viewId === 'front') plane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
                else if (viewId === 'right') plane = new THREE.Plane(new THREE.Vector3(1, 0, 0), 0);
                
                const pos = new THREE.Vector3();
                if (ray.intersectPlane(plane, pos)) {
                    const gx = Math.round(pos.x), gy = Math.max(0, Math.round(pos.y)), gz = Math.round(pos.z);
                    addNode(gx, gy, gz);
                    addNode(-gx, gy, gz);
                    addNode(gx, gy, -gz);
                    addNode(-gx, gy, -gz);
                }
            } else if (mode === 'edge' && intersects.length > 0) {
                const node = nodes.find(n => n.meshes[viewId] === intersects[0].object);
                if (!selectedNode) {
                    selectedNode = node;
                    highlightNode(selectedNode, true);
                } else {
                    if (selectedNode !== node) {
                        addEdge(selectedNode, node);
                        // 대칭 부재 추가
                        const n1 = selectedNode, n2 = node;
                        const n1Z = nodes.find(n => n.x === n1.x && n.z === -n1.z && n.y === n1.y);
                        const n2Z = nodes.find(n => n.x === n2.x && n.z === -n2.z && n.y === n2.y);
                        if(n1Z && n2Z) addEdge(n1Z, n2Z);
                        const n1X = nodes.find(n => n.x === -n1.x && n.z === n1.z && n.y === n1.y);
                        const n2X = nodes.find(n => n.x === -n2.x && n.z === n2.z && n.y === n2.y);
                        if(n1X && n2X) addEdge(n1X, n2X);
                    }
                    highlightNode(selectedNode, false);
                    selectedNode = null;
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            controls3d.update();
            renderer3d.render(scene3d, camera3d);
            Object.values(views).forEach(v => v.renderer && v.renderer.render(v.scene, v.camera));
        }

        window.onload = init;
    </script>
</body>
</html>
